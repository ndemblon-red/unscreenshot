<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#5B5BD6" />

    <title>Unscreenshot — Your camera roll, but useful</title>
    <meta name="description" content="Stop screenshotting into the void. Turn your camera roll into a to-do list that actually follows up." />
    <meta name="author" content="Unscreenshot" />
    <link rel="canonical" href="https://unscreenshot.ai/" />

    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:title" content="Unscreenshot — Your camera roll, but useful" />
    <meta property="og:description" content="Stop screenshotting into the void. Turn your camera roll into a to-do list that actually follows up." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://unscreenshot.ai/" />
    <meta property="og:image" content="https://unscreenshot.ai/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Unscreenshot" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Unscreenshot — Your camera roll, but useful" />
    <meta name="twitter:description" content="Stop screenshotting into the void. Turn your camera roll into a to-do list that actually follows up." />
    <meta name="twitter:image" content="https://unscreenshot.ai/og-image.png" />

    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Unscreenshot",
        "description": "Upload your screenshots. AI turns them into reminders with deadlines. You get nudged before they expire.",
        "applicationCategory": "ProductivityApplication",
        "operatingSystem": "Web",
        "url": "https://unscreenshot.ai/",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
